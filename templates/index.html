<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aeon CAT Quiz Generator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="container">
    <h1>Aeon → CAT Quiz Generator</h1>
    <p>Paste an Aeon article URL to generate a CAT-style reading comprehension quiz.</p>

    {% if error %}
      <div class="error-box">{{ error }}</div>
    {% endif %}

    <form id="quiz-form" action="{{ url_for('generate_quiz') }}" method="POST">
      <label for="article_url">Aeon Article URL</label>
      <input
        id="article_url"
        name="article_url"
        type="url"
        placeholder="https://aeon.co/essays/..."
        required
      />

      <button type="submit">Generate Quiz</button>
    </form>

    <div id="loading" class="loading hidden">
      Generating quiz... this may take 10-30 seconds.
    </div>
  </div>

  <script>
    const form = document.getElementById('quiz-form');
    const loading = document.getElementById('loading');
    form.addEventListener('submit', () => {
      loading.classList.remove('hidden');
    });
  </script>
</body>
</html>
